name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # pnpm workspace. Install at root, then run tests per package.
  # Each workspace's test runs in its own cwd so desktop's jsdom
  # config is used (not panmira's default node env).
  # Lint skipped: panmira backend has 14 pre-existing lint errors
  # unrelated to desktop work. Will re-enable in a separate cleanup PR.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Run tests (panmira backend)
        run: pnpm -F panmira test

      - name: Run tests (desktop)
        run: pnpm -F @panmira/desktop test

  build:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - name: Build panmira backend (known broken, see PR #10)
        run: pnpm run build || true
        continue-on-error: true
