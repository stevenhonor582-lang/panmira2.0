name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # undici 8.4 requires Node 22.19+, so we must use Node 22.
  # The bundled npm 10.8.x has a bug ("Exit handler never called!") on
  # this repo's lockfile. Pin npm to 10.9.0 (first version with the fix).
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Pin npm to fixed version
        run: npm install -g npm@10.9.0

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: ./node_modules/.bin/tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Pin npm to fixed version
        run: npm install -g npm@10.9.0

      - run: npm ci
      - run: npm run build
