name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  # Build Windows .exe installer. Uses GitHub-hosted windows-latest
  # runner (native Node 22, no Wine needed).
  #
  # sparse-checkout is required: the panmira repo has files with `:` in
  # their names (skills/superpowers:brainstorming/SKILL.md) which
  # Windows filesystems reject at checkout time. We only need
  # desktop/ for the build.
  #
  # The `--no-cone` mode + `--filter=blob:none` combo is used because
  # the default cone mode still touches the offending paths in the
  # index. With blob:none, git fetch doesn't download those blobs,
  # and with --no-cone + the explicit `/*!/skills/*` exclusion, the
  # working tree is built without them.
  test:
    name: Unit + E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json
      - working-directory: desktop
        run: npm ci
      - working-directory: desktop
        run: npm test
      - working-directory: desktop
        run: npx playwright install --with-deps chromium
      - working-directory: desktop
        continue-on-error: true
        run: npm run test:e2e
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: desktop/coverage/
          retention-days: 7

  build-windows:
    name: Build Windows .exe
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none

      - name: Configure sparse-checkout
        shell: bash
        run: |
          git sparse-checkout init --no-cone
          git sparse-checkout set '/*' '!/.git' '!/.github' '!/bin' '!/config' '!/data' '!/db' '!/dist' '!/docker*' '!/docs' '!/logs' '!/migrations' '!/node_modules' '!/scripts' '!/setup.sh' '!/src' '!/templates' '!/tests' '!/tools' '!/tsconfig*' '!/uninstall.sh' '!/web' '/desktop' '/desktop/**'
          git checkout HEAD --

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'
          cache: 'pnpm'
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Type check (main)
        working-directory: desktop
        run: pnpm exec tsc -p tsconfig.main.json

      - name: Type check (preload, emits CJS)
        working-directory: desktop
        run: pnpm exec tsc -p tsconfig.preload.json

      - name: Build renderer
        working-directory: desktop
        run: pnpm exec vite build

      - name: Package Windows installer
        working-directory: desktop
        run: pnpm exec electron-builder --win --x64 --publish never

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PanmiraDesktop-Setup-windows-x64
          path: |
            desktop/release/Panmira Desktop Setup *.exe
            desktop/release/latest.yml
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/desktop-v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            desktop/release/Panmira Desktop Setup *.exe
            desktop/release/latest.yml
