name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  # Build Windows .exe installer. Uses GitHub-hosted windows-latest
  # runner (native Node 22, no Wine needed). 
  #
  # sparse-checkout is required: the panmira repo has files with `:` in
  # their names (skills/superpowers:brainstorming/SKILL.md) which are
  # illegal on Windows filesystems. We only need desktop/ for the
  # build, so we checkout only that subdirectory.
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: desktop
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'
          cache: 'pnpm'
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Type check (main)
        working-directory: desktop
        run: pnpm exec tsc -p tsconfig.main.json

      - name: Type check (preload, emits CJS)
        working-directory: desktop
        run: pnpm exec tsc -p tsconfig.preload.json

      - name: Build renderer
        working-directory: desktop
        run: pnpm exec vite build

      - name: Package Windows installer
        working-directory: desktop
        # --publish never: skip release provider upload. We handle the
        # GitHub release below via softprops/action-gh-release.
        run: pnpm exec electron-builder --win --x64 --publish never

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PanmiraDesktop-Setup-windows-x64
          path: |
            desktop/release/Panmira Desktop Setup *.exe
            desktop/release/latest.yml
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/desktop-v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            desktop/release/Panmira Desktop Setup *.exe
            desktop/release/latest.yml
