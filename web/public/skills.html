<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panmira — Skill 管理</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;--text:#e1e4ed;--muted:#8b8fa7;--accent:#6c8aff;--green:#34d399;--red:#f87171;--yellow:#fbbf24}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header h1{font-size:18px;font-weight:600}
.badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-global{background:rgba(108,138,255,.15);color:var(--accent)}
.badge-bot{background:rgba(251,191,36,.15);color:var(--yellow)}
.badge-admin{background:rgba(52,211,153,.15);color:var(--green)}
.layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 57px)}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:16px}
.sidebar h3{font-size:12px;text-transform:uppercase;color:var(--muted);margin:12px 0 6px}
.sidebar a,.sidebar button{display:block;width:100%;text-align:left;padding:6px 10px;border-radius:4px;color:var(--text);text-decoration:none;font-size:14px;border:none;background:none;cursor:pointer}
.sidebar a:hover,.sidebar button:hover,.sidebar a.active{background:rgba(108,138,255,.1);color:var(--accent)}
.main{padding:24px;overflow-x:auto}
.toolbar{display:flex;gap:8px;margin-bottom:16px;align-items:center}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px}
.btn:hover{background:var(--border)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:#5b7af0}
.btn-danger{color:var(--red)}
select{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:6px;font-size:13px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
th{color:var(--muted);font-weight:500;font-size:12px;text-transform:uppercase}
tr:hover{background:rgba(108,138,255,.05)}
.toggle{width:40px;height:22px;border-radius:11px;border:none;cursor:pointer;position:relative;transition:background .2s}
.toggle.on{background:var(--green)}
.toggle.off{background:var(--border)}
.toggle::after{content:'';position:absolute;top:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s}
.toggle.on::after{left:20px}
.toggle.off::after{left:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:560px;max-height:80vh;overflow-y:auto}
.modal h2{font-size:16px;margin-bottom:16px}
.modal label{display:block;font-size:12px;color:var(--muted);margin:8px 0 4px}
.modal input,.modal textarea,.modal select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:4px;font-size:13px}
.modal textarea{min-height:200px;font-family:monospace}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.empty{text-align:center;padding:40px;color:var(--muted)}
</style>
</head>
<body>
<div class="header">
  <h1>🛠️ Panmira Skill 管理</h1>
  <div id="adminStatus"></div>
</div>
<div class="layout">
  <nav class="sidebar">
    <h3>作用域</h3>
    <a href="#" class="active" data-filter="all">全部 Skills</a>
    <a href="#" data-filter="global">🌐 全局</a>
    <a href="#" data-filter="bot">🤖 Bot 私有</a>
    <h3>Bot</h3>
    <div id="botList"></div>
    <h3>操作</h3>
    <button onclick="showCreateModal()">+ 新建 Skill</button>
    <button onclick="location.reload()">🔄 刷新</button>
  </nav>
  <main class="main">
    <div class="toolbar">
      <select id="botFilter" onchange="renderTable()">
        <option value="">所有 Bot</option>
      </select>
      <input type="text" id="searchInput" placeholder="搜索 skill..." oninput="renderTable()" style="background:var(--surface);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:6px;font-size:13px;width:200px">
    </div>
    <table>
      <thead><tr><th>名称</th><th>摘要</th><th>作用域</th><th>所有者</th><th>启用</th><th>操作</th></tr></thead>
      <tbody id="skillTable"><tr><td colspan="6" class="empty">加载中...</td></tr></tbody>
    </table>
  </main>
</div>

<div id="modalContainer"></div>

<script>
const API = '/api/skills';
let skills=[],bindings=[],bots=[],currentFilter='all',currentBot='';

async function init(){
  await Promise.all([loadSkills(),loadBindings(),loadBots()]);
  renderAll();
}
async function loadSkills(){
  try{const r=await fetch(API);const d=await r.json();skills=d.skills||d||[];}catch(e){skills=[]}
}
async function loadBindings(){
  try{const r=await fetch('/api/skills/registry');const d=await r.json();bindings=[];/* registry returns global */}catch(e){}
  // Load per-bot bindings from DB via a quick proxy
  try{
    const r=await fetch('/api/bots');
    const d=await r.json();
    bots=(d.bots||d||[]).map(b=>({name:b.name||b.id,admin:b.config?.permissions?.isAdminBot}));
  }catch(e){bots=[]}
}

async function loadBots(){
  try{
    const r=await fetch('/api/bots');
    const d=await r.json();
    bots=(Array.isArray(d)?d:(d.bots||[])).map(b=>({name:b.name||b.id,admin:!!(b.config?.permissions?.isAdminBot)}));
    document.getElementById('botList').innerHTML=bots.map(b=>
      `<button onclick="currentBot='${b.name}';renderTable();document.querySelectorAll('.sidebar a').forEach(a=>a.classList.remove('active'));event.target.classList.add('active')">${b.admin?'⭐':''} ${b.name}</button>`
    ).join('');
    document.getElementById('botFilter').innerHTML='<option value="">所有 Bot</option>'+bots.map(b=>`<option value="${b.name}">${b.name}</option>`).join('');
    const adminBot=bots.find(b=>b.admin);
    document.getElementById('adminStatus').innerHTML=adminBot?`<span class="badge badge-admin">管理员: ${adminBot.name}</span>`:'<span class="badge" style="color:var(--yellow)">⚠️ 无管理员 Bot</span>';
  }catch(e){console.error(e)}
}

async function toggleSkill(skillName,enabled){
  if(!currentBot){alert('请先在左侧选择一个 Bot');return}
  try{
    await fetch(`/api/bot-skills/${encodeURIComponent(currentBot)}/${encodeURIComponent(skillName)}`,{
      method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled,scope:enabled?'global':'bot'})
    });
    renderTable();
  }catch(e){alert('Failed: '+e.message)}
}

async function deleteSkill(name){
  if(!confirm('删除 skill: '+name+'?'))return;
  const adminBot=bots.find(b=>b.admin);
  if(!adminBot){alert('无管理员 bot');return}
  try{
    await fetch(`/api/skills/${encodeURIComponent(name)}`,{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({botName:adminBot.name})});
    await loadSkills();
    renderTable();
  }catch(e){alert('Failed: '+e.message)}
}

function renderAll(){
  document.querySelectorAll('.sidebar a[data-filter]').forEach(a=>{a.classList.toggle('active',a.dataset.filter===currentFilter)});
  document.getElementById('botFilter').value=currentBot;
  renderTable();
}

function renderTable(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  let filtered=skills;
  if(currentFilter==='global')filtered=filtered.filter(s=>!s.scope||s.scope==='global');
  if(currentFilter==='bot')filtered=filtered.filter(s=>s.scope==='bot'&&(!currentBot||s.ownerBot===currentBot));
  if(search)filtered=filtered.filter(s=>s.name.toLowerCase().includes(search)||(s.summary||'').toLowerCase().includes(search));

  document.getElementById('skillTable').innerHTML=filtered.length===0
    ?'<tr><td colspan="6" class="empty">暂无数据</td></tr>'
    :filtered.map(s=>{
      const scope=s.scope||'global';
      const isBotSkill=scope==='bot';
      const isEnabled=true; // default
      return `<tr>
        <td><strong>${s.name}</strong></td>
        <td style="color:var(--muted)">${(s.summary||'').slice(0,60)}</td>
        <td><span class="badge ${isBotSkill?'badge-bot':'badge-global'}">${isBotSkill?'bot · '+ (s.ownerBot||'') :'global'}</span></td>
        <td style="color:var(--muted)">${s.ownerBot||'—'}</td>
        <td><button class="toggle ${isEnabled?'on':'off'}" onclick="toggleSkill('${s.name}',${!isEnabled})" title="${isEnabled?'启用中':'已禁用'}"></button></td>
        <td>
          <button class="btn btn-danger" style="padding:2px 8px;font-size:11px" onclick="deleteSkill('${s.name}')">🗑</button>
        </td>
      </tr>`;
    }).join('');
}

function showCreateModal(){
  const adminBot=bots.find(b=>b.admin);
  const html=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>新建 Skill</h2>
        <label>名称</label><input id="newName" placeholder="skill-name">
        <label>描述</label><input id="newDesc" placeholder="简短描述这个 skill 的功能">
        <label>触发词（逗号分隔）</label><input id="newTriggers" placeholder="触发词1, 触发词2">
        <label>分类</label>
        <select id="newCat">
          <option value="productivity">productivity</option>
          <option value="system">system</option>
          <option value="knowledge">knowledge</option>
          <option value="communication">communication</option>
          <option value="voice">voice</option>
          <option value="admin">admin</option>
        </select>
        <label>作用域</label>
        <select id="newScope" onchange="document.getElementById('ownerField').style.display=this.value==='bot'?'block':'none'">
          <option value="bot">bot — 私有</option>
          ${adminBot?'<option value="global">global — 全局（管理员）</option>':''}
        </select>
        <div id="ownerField"><label>所属 Bot</label><input id="newOwner" value="${adminBot?.name||''}"></div>
        <label>SKILL.md 内容</label><textarea id="newMd" placeholder="# Skill 名称&#10;&#10;## 描述&#10;..."></textarea>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" onclick="createSkill()">创建</button>
        </div>
      </div>
    </div>`;
  document.getElementById('modalContainer').innerHTML=html;
}

function closeModal(){document.getElementById('modalContainer').innerHTML='';}

async function createSkill(){
  const name=document.getElementById('newName').value.trim();
  const scope=document.getElementById('newScope').value;
  const botName=document.getElementById('newOwner')?.value?.trim();
  const skillMd=document.getElementById('newMd').value;
  if(!name||!skillMd){alert('名称和内容不能为空');return}

  try{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,scope,botName,skillMd,author:botName||'web'})
    });
    if(!r.ok){const e=await r.json();alert(e.error||'创建失败');return}
    closeModal();
    await loadSkills();
    renderTable();
  }catch(e){alert('Failed: '+e.message)}
}

// Sidebar filter clicks
document.querySelector('.sidebar').addEventListener('click',e=>{
  if(e.target.dataset.filter){e.preventDefault();currentFilter=e.target.dataset.filter;renderAll()}
});

init();
</script>
</body>
</html>
